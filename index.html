<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THE SHIVANSH CHRONICLES</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#ff3c00;
font-family:'Share Tech Mono',monospace;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.container{
padding:20px;
}

h1{
font-size:60px;
font-family:'Creepster',cursive;
text-shadow:0 0 20px red;
animation:flicker 2s infinite;
}

h2{
margin-top:20px;
font-size:25px;
}

p{
margin-top:20px;
font-size:18px;
line-height:30px;
}

button{
margin-top:30px;
padding:15px 30px;
background:black;
border:2px solid red;
color:red;
font-size:20px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:red;
color:black;
}

input{
padding:15px;
font-size:20px;
background:black;
border:2px solid red;
color:white;
margin-top:20px;
}

@keyframes flicker{
0%{opacity:1}
50%{opacity:0.5}
100%{opacity:1}
}
</style>
</head>

<body>

<div class="container" id="screen">

<h1>AGENT BLACK BABU</h1>

<h2>MISSION ACCEPTED</h2>

<p>
Aaj se 13 saal pehle,<br>
ek legendary gamer ka janam hua tha.<br><br>

Codename: <b>BLACK BABU</b><br><br>

Minecraft, Brookhaven aur BMW M4 mission
ab shuru hone wala hai.
</p>

<button onclick="portal()">
ENTER THE UPSIDE DOWN
</button>

</div>

<script>

function portal(){

document.getElementById("screen").innerHTML=`

<h1>⚠ PORTAL OPENED ⚠</h1>

<h2>WELCOME TO THE UPSIDE DOWN</h2>

<p>
Happy Birthday Shivansh!<br><br>

Age: 13<br>
Status: Legendary Gamer<br>
Favorite Vehicle: BMW M4<br>
Favorite Games: Minecraft + Roblox
</p>

<button onclick="minecraft()">
START MISSION
</button>

`;

}

function minecraft(){

document.getElementById("screen").innerHTML=`

<h1>⛏ MINECRAFT MISSION</h1>

<h2>CREEPER DETECTED</h2>

<p>
Secret code enter karo:<br><br>
Hint: Tumhari age kya hui?
</p>

<input id="ans">

<br>

<button onclick="check()">
SUBMIT
</button>

`;

}

function check(){

let x=document.getElementById("ans").value;

if(x=="13"){

document.getElementById("screen").innerHTML=`

<h1>🎉 MISSION COMPLETED 🎉</h1>

<h2>HAPPY 13TH BIRTHDAY SHIVANSH</h2>

<p>
From the entire family ❤️<br><br>

Tum sirf hamare bhai nahi ho,<br>
tum hamare BLACK BABU ho.<br><br>

May your Minecraft worlds,
Brookhaven houses,
BMW dreams,
aur life ke saare missions
successful ho.
</p>

<h1>🎂🎆🎉</h1>

`;

}
else{

alert("Wrong code! Try Again.");

}

}

</script>

</body>
</html>
